<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Login | InvenTrack</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="validation.js"></script>
    <style>
        .forgot-password-link {
            text-align: right;
            margin-bottom: 1.5rem;
        }
        
        .forgot-password-link a {
            color: #3b82f6;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        .forgot-password-link a:hover {
            text-decoration: underline;
        }
        
        .disclaimer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
            color: #64748b;
            font-size: 0.8rem;
        }
        
        .disclaimer i {
            margin-right: 0.25rem;
            color: #f59e0b;
        }
        
        .modal .btn-primary {
            width: 100%;
            justify-content: center;
        }
    </style>
</head>

<body class="login-bg">
    <div class="login-wrapper">
        <div class="login-header">
            <i class="fas fa-cubes"></i>
            <h2>InvenTrack</h2>
            <p>Welcome back! Please login to your account.</p>
        </div>
        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" placeholder="admin@inventrack.com" required>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
            </div>
            <div class="forgot-password-link">
                <a href="#" onclick="showForgotPasswordModal(); return false;">
                    <i class="fas fa-key"></i> Forgot Password?
                </a>
            </div>
            <button type="submit" class="btn-primary login-btn">Sign In</button>
        </form>
        <div class="disclaimer">
            <i class="fas fa-info-circle"></i>
            You can change your password in the "Change Password" tab after logging in.
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotPasswordModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeForgotPasswordModal()"><i class="fas fa-times"></i></span>
            <h2 style="margin-top: 0; margin-bottom: 1rem; color: #0f172a;">
                <i class="fas fa-envelope" style="color: #3b82f6; margin-right: 8px;"></i>
                Reset Password
            </h2>
            <p style="color: #64748b; margin-bottom: 1.5rem; font-size: 0.9rem;">
                Enter your email address and we'll send you your password.
            </p>
            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="resetEmail" required placeholder="your@email.com">
                </div>
                <button type="submit" class="btn-primary">
                    <i class="fas fa-paper-plane"></i> Send Password
                </button>
            </form>
            <p style="color: #94a3b8; font-size: 0.75rem; margin-top: 1rem; text-align: center;">
                <i class="fas fa-shield-alt"></i> Password will be sent to your registered email
            </p>
        </div>
    </div>

    <script>
        localStorage.clear();
        const API_URL = 'https://inventrack-backend-2wso.onrender.com/api';
        
        const modal = document.getElementById('forgotPasswordModal');
        
        window.showForgotPasswordModal = function() {
            modal.classList.add('active');
        };
        
        window.closeForgotPasswordModal = function() {
            modal.classList.remove('active');
        };
        
        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                alert('Please enter both email and password');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userRole', data.user.role);
                    localStorage.setItem('userName', data.user.name);
                    localStorage.setItem('userEmail', data.user.email);
                    localStorage.setItem('userId', data.user.id);

                    if (data.user.role === 'Staff') {
                        window.location.href = 'products.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    const error = await response.json();
                    alert(error.error || 'Invalid credentials');
                }
            } catch (error) {
                console.error('Login error:', error);
                alert('Cannot connect to server. Please try again.');
            }
        });

        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('resetEmail').value;
            
            if (!email) {
                alert('Please enter your email address');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert(`✅ ${data.message}`);
                    closeForgotPasswordModal();
                } else {
                    alert(`❌ ${data.error}`);
                }
            } catch (error) {
                console.error('Forgot password error:', error);
                alert('Cannot connect to server. Please try again.');
            }
        });
    </script>
</body>

</html>
