<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <title>Categories | InvenTrack</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="validation.js"></script>
    <style>
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 1.25rem;
            border-radius: 12px;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            margin-bottom: 2rem;
            gap: 1rem;
        }

        .search-wrapper {
            position: relative;
            width: 100%;
            max-width: 300px;
        }

        .search-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .search-wrapper input {
            padding-left: 2.5rem;
            width: 100%;
        }

        .table-actions button {
            background: transparent;
            border: none;
            cursor: pointer;
            color: #64748b;
            font-size: 1.1rem;
            transition: color 0.2s;
            margin-right: 0.5rem;
            padding: 0;
        }

        .table-actions button:hover {
            color: #3b82f6;
        }

        .table-actions button.del:hover {
            color: #ef4444;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            cursor: pointer;
            color: #94a3b8;
            font-size: 1.25rem;
            transition: 0.2s;
        }

        .close-modal:hover {
            color: #ef4444;
        }
    </style>
    <script src="auth.js"></script>
</head>

<body>
    <aside class="sidebar">
        <h2><i class="fas fa-cubes"></i> InvenTrack</h2>
        <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="products.html"><i class="fas fa-box"></i> Products</a>
        <a href="categories.html" class="active"><i class="fas fa-tags"></i> Categories</a>
        <a href="stock.html"><i class="fas fa-exchange-alt"></i> Stock</a>
        <a href="suppliers.html"><i class="fas fa-truck-loading"></i> Suppliers</a>
        <a href="reports.html"><i class="fas fa-file-invoice"></i> Reports</a>
        <a href="users.html"><i class="fas fa-users-cog"></i> Users & Roles</a>
        <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
        <a href="change-password.html"><i class="fas fa-key"></i> Change Password</a>
        <a href="index.html" style="margin-top: auto; border-top: 1px solid #1e293b; color: #ef4444;"><i
                class="fas fa-sign-out-alt"></i> Logout</a>
    </aside>

    <main class="main-content">
        <h1 class="page-header">Categories Management</h1>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search categories...">
            </div>
            <button id="addCatBtn" class="btn-primary" style="width: auto;"><i class="fas fa-plus"></i> Add
                Category</button>
        </div>

        <!-- Categories Table -->
        <section class="box-section">
            <div style="overflow-x: auto;">
                <table style="min-width: 600px;">
                    <thead>
                        <tr>
                            <th>Category Name</th>
                            <th>Description</th>
                            <th>Total Products</th>
                            <th>Created Date</th>
                            <th style="text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="categoryTableBody">
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Add/Edit Category Modal -->
    <div id="categoryModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeModalBtn"><i class="fas fa-times"></i></span>
            <h2 id="modalTitle" style="margin-top: 0; margin-bottom: 1.5rem; color: #0f172a;">Add New Category</h2>
            <form id="categoryForm">
                <div class="form-group">
                    <label>Category Name</label>
                    <input type="text" id="catName" required placeholder="e.g. Office Supplies">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="catDesc" required placeholder="A brief description of this category">
                </div>
                <div class="form-group">
                    <label>Initial Products Count</label>
                    <input type="number" id="catProducts" min="0" value="0" placeholder="0">
                </div>
                <button type="submit" class="btn-primary"
                    style="margin-top: 1rem; padding: 0.8rem; font-size: 1.1rem;">Save Category</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://inventrack-backend-2wso.onrender.com/api';
        const modal = document.getElementById('categoryModal');
        const addBtn = document.getElementById('addCatBtn');
        const closeBtn = document.getElementById('closeModalBtn');
        const form = document.getElementById('categoryForm');
        const tableBody = document.getElementById('categoryTableBody');
        const modalTitle = document.getElementById('modalTitle');

        let editingId = null;
        let allCategories = [];

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function validateCategory(category) {
            if (!category.name || category.name.length < 2) {
                alert('Category name must be at least 2 characters');
                return false;
            }
            return true;
        }

        function renderCategories(categoriesToRender) {
            tableBody.innerHTML = '';
            if (categoriesToRender.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No categories found</td></tr>';
                return;
            }

            categoriesToRender.forEach(category => {
                const tr = document.createElement('tr');
                tr.dataset.id = category.id;
                tr.innerHTML = `
                <td style="font-weight: 600;">${escapeHtml(category.name)}</td>
                <td style="color: #64748b;">${escapeHtml(category.description || '')}</td>
                <td>${category.total_products || 0}</td>
                <td style="color: #64748b;">${category.created_date || new Date().toISOString().split('T')[0]}</td>
                <td class="table-actions" style="text-align: right;">
                    <button title="Edit Category" onclick='editCategory(${JSON.stringify(category)})'><i class="fas fa-edit"></i></button>
                    <button title="Delete Category" class="del" onclick="deleteCategory(${category.id})"><i class="fas fa-trash-alt"></i></button>
                </td>
            `;
                tableBody.appendChild(tr);
            });
        }

        function filterCategories() {
            const searchInput = document.querySelector('.search-wrapper input');
            const searchTerm = searchInput?.value.toLowerCase() || '';

            const filtered = allCategories.filter(category =>
                searchTerm === '' ||
                category.name.toLowerCase().includes(searchTerm) ||
                (category.description && category.description.toLowerCase().includes(searchTerm))
            );

            renderCategories(filtered);
        }

        async function loadCategories() {
            try {
                const response = await fetch(`${API_URL}/categories`);
                allCategories = await response.json();
                renderCategories(allCategories);
            } catch (error) {
                console.error('Error loading categories:', error);
                alert('Failed to load categories');
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const category = {
                name: document.getElementById('catName').value.trim(),
                description: document.getElementById('catDesc').value.trim(),
                total_products: parseInt(document.getElementById('catProducts').value) || 0
            };

            if (!validateCategory(category)) return;

            try {
                let response;
                if (editingId) {
                    response = await fetch(`${API_URL}/categories/${editingId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(category)
                    });
                } else {
                    response = await fetch(`${API_URL}/categories`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(category)
                    });
                }

                if (response.ok) {
                    await loadCategories();
                    modal.classList.remove('active');
                    form.reset();
                    editingId = null;
                } else {
                    alert('Failed to save category');
                }
            } catch (error) {
                console.error('Error saving category:', error);
                alert('Failed to save category');
            }
        });

        window.deleteCategory = async (id) => {
            if (confirm('Are you sure you want to delete this category?')) {
                try {
                    await fetch(`${API_URL}/categories/${id}`, { method: 'DELETE' });
                    await loadCategories();
                } catch (error) {
                    console.error('Error deleting category:', error);
                    alert('Failed to delete category');
                }
            }
        };

        window.editCategory = (category) => {
            editingId = category.id;
            document.getElementById('catName').value = category.name;
            document.getElementById('catDesc').value = category.description || '';
            document.getElementById('catProducts').value = category.total_products || 0;
            modalTitle.innerText = "Edit Category";
            modal.classList.add('active');
        };

        addBtn.addEventListener('click', () => {
            editingId = null;
            form.reset();
            modalTitle.innerText = "Add New Category";
            modal.classList.add('active');
        });

        closeBtn.addEventListener('click', () => modal.classList.remove('active'));
        window.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.remove('active');
        });

        // Add search listener
        const searchInput = document.querySelector('.search-wrapper input');
        if (searchInput) searchInput.addEventListener('input', filterCategories);

        loadCategories();
    </script>
</body>

</html>
