<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <title>Stock Management | InvenTrack</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
    <script src="validation.js"></script>
</head>

<body>
    <aside class="sidebar">
        <h2><i class="fas fa-cubes"></i> InvenTrack</h2>
        <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="products.html"><i class="fas fa-box"></i> Products</a>
        <a href="categories.html"><i class="fas fa-tags"></i> Categories</a>
        <a href="stock.html" class="active"><i class="fas fa-exchange-alt"></i> Stock</a>
        <a href="suppliers.html"><i class="fas fa-truck-loading"></i> Suppliers</a>
        <a href="reports.html"><i class="fas fa-file-invoice"></i> Reports</a>
        <a href="users.html"><i class="fas fa-users-cog"></i> Users & Roles</a>
        <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
        <a href="change-password.html"><i class="fas fa-key"></i> Change Password</a>
        <a href="index.html" style="margin-top: auto; border-top: 1px solid #1e293b; color: #ef4444;"><i
                class="fas fa-sign-out-alt"></i> Logout</a>
    </aside>

    <main class="main-content">
        <h1 class="page-header" style="margin-bottom: 2rem;">Stock Management</h1>

        <div class="grid-2">
            <!-- Stock In Box -->
            <section class="box-section">
                <h3 style="color: #10b981; border-bottom: 2px solid #f1f5f9; padding-bottom: 1rem;">
                    <i class="fas fa-arrow-down" style="margin-right: 0.5rem;"></i> Stock In
                </h3>

                <form id="stockInForm">
                    <div class="form-group">
                        <label>Select Product</label>
                        <select id="stockInProduct" required>
                            <option value="">-- Choose Product --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" id="stockInQuantity" required min="1" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label>Supplier <span style="font-weight: normal; color: #94a3b8;">(Optional)</span></label>
                        <input type="text" id="stockInSupplier" placeholder="e.g. Dell Distributor LLC">
                    </div>
                    <button type="submit" class="btn-primary"
                        style="background-color: #10b981; border: none; width: 100%; margin-top: 1.5rem; padding: 1rem; font-size: 1.1rem;">
                        Record Stock In
                    </button>
                </form>
            </section>

            <!-- Stock Out Box -->
            <section class="box-section">
                <h3 style="color: #ef4444; border-bottom: 2px solid #f1f5f9; padding-bottom: 1rem;">
                    <i class="fas fa-arrow-up" style="margin-right: 0.5rem;"></i> Stock Out
                </h3>

                <form id="stockOutForm">
                    <div class="form-group">
                        <label>Select Product</label>
                        <select id="stockOutProduct" required>
                            <option value="">-- Choose Product --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" id="stockOutQuantity" required min="1" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label>Reason</label>
                        <select id="stockOutReason" required>
                            <option value="">-- Choose Reason --</option>
                            <option value="Sale">Sale</option>
                            <option value="Internal Usage">Internal Usage</option>
                            <option value="Damage / Loss">Damage / Loss</option>
                            <option value="Transfer">Transfer to Other Location</option>
                            <option value="Expired">Expired Products</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary"
                        style="background-color: #ef4444; border: none; width: 100%; margin-top: 1.5rem; padding: 1rem; font-size: 1.1rem;">
                        Record Stock Out
                    </button>
                </form>
            </section>
        </div>

        <!-- Recent Movements History Table -->
        <section class="box-section" style="margin-top: 2rem;">
            <div
                style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 1rem; margin-bottom: 1rem;">
                <h3 style="margin: 0;"><i class="fas fa-history" style="color:#3b82f6; margin-right:8px;"></i> Recent
                    Movements History</h3>
                <button id="clearHistoryBtn" class="btn-outline" style="color: #ef4444; border-color: #ef4444;"><i
                        class="fas fa-trash-alt"></i> Clear</button>
            </div>
            <div style="overflow-x: auto;">
                <table style="min-width: 800px;">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Product Name</th>
                            <th>Type</th>
                            <th>Quantity</th>
                            <th>Details (Reason/Supplier)</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody">
                        <tr>
                            <td colspan="5" style="text-align: center; color: #94a3b8; padding: 2rem 0;">No recent
                                movements recorded today.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const API_URL = 'https://inventrack-backend-2wso.onrender.com/api';
        const historyBody = document.getElementById('historyTableBody');

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        async function loadMovements() {
            try {
                const response = await fetch(`${API_URL}/stock-movements`);
                const movements = await response.json();

                if (movements.length === 0) {
                    historyBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #94a3b8; padding: 2rem 0;">No recent movements recorded.</td></tr>`;
                    return;
                }

                historyBody.innerHTML = '';
                movements.forEach(m => {
                    const tr = document.createElement('tr');
                    const typeHtml = m.type === 'IN'
                        ? '<span style="color: #10b981; font-weight: 600;"><i class="fas fa-arrow-down" style="margin-right: 4px;"></i> IN</span>'
                        : '<span style="color: #ef4444; font-weight: 600;"><i class="fas fa-arrow-up" style="margin-right: 4px;"></i> OUT</span>';

                    tr.innerHTML = `
                    <td style="color: #64748b;">${m.date}</td>
                    <td style="font-weight: 600; color: #0f172a;">${escapeHtml(m.product_name)}</td>
                    <td>${typeHtml}</td>
                    <td>${m.quantity}</td>
                    <td style="color: #64748b;">${escapeHtml(m.details || 'N/A')}</td>
                `;
                    historyBody.appendChild(tr);
                });
            } catch (error) {
                console.error('Error loading movements:', error);
            }
        }

        async function loadProductsForDropdowns() {
            try {
                const response = await fetch(`${API_URL}/products`);
                if (!response.ok) {
                    console.error('Failed to fetch products:', response.status);
                    return;
                }
                const products = await response.json();

                const stockInSelect = document.getElementById('stockInProduct');
                if (stockInSelect) {
                    stockInSelect.innerHTML = '<option value="">-- Choose Product --</option>';
                    products.forEach(p => {
                        const option = document.createElement('option');
                        option.value = p.id;
                        option.textContent = `${p.name} (Stock: ${p.quantity})`;
                        option.dataset.quantity = p.quantity;
                        stockInSelect.appendChild(option);
                    });
                }

                const stockOutSelect = document.getElementById('stockOutProduct');
                if (stockOutSelect) {
                    stockOutSelect.innerHTML = '<option value="">-- Choose Product --</option>';
                    products.forEach(p => {
                        const option = document.createElement('option');
                        option.value = p.id;
                        option.textContent = `${p.name} (Stock: ${p.quantity})`;
                        option.dataset.quantity = p.quantity;
                        stockOutSelect.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error loading products:', error);
            }
        }

        const stockInForm = document.getElementById('stockInForm');
        if (stockInForm) {
            stockInForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const productSelect = document.getElementById('stockInProduct');
                const productId = productSelect.value;
                const productName = productSelect.options[productSelect.selectedIndex]?.text.split(' (Stock:')[0];
                const qty = parseInt(document.getElementById('stockInQuantity').value);
                const supplier = document.getElementById('stockInSupplier').value;

                if (!productId) {
                    alert('Please select a product');
                    return;
                }
                if (!qty || qty <= 0) {
                    alert('Please enter a valid quantity greater than 0');
                    return;
                }

                try {
                    const response = await fetch(`${API_URL}/stock-movements`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            product_id: parseInt(productId),
                            product_name: productName,
                            type: 'IN',
                            quantity: qty,
                            details: supplier ? `Supplier: ${supplier}` : 'Stock In'
                        })
                    });

                    if (response.ok) {
                        await loadMovements();
                        await loadProductsForDropdowns();
                        stockInForm.reset();
                        window.dispatchEvent(new CustomEvent('stockMovementChanged'));
                        alert(`✅ Stock In recorded! Added ${qty} units of ${productName}`);
                    } else {
                        const error = await response.json();
                        alert('Failed to record stock in: ' + error.error);
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('Error recording stock in');
                }
            });
        }

        const stockOutForm = document.getElementById('stockOutForm');
        if (stockOutForm) {
            stockOutForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const productSelect = document.getElementById('stockOutProduct');
                const productId = productSelect.value;
                const productName = productSelect.options[productSelect.selectedIndex]?.text.split(' (Stock:')[0];
                const currentStock = parseInt(productSelect.options[productSelect.selectedIndex]?.dataset.quantity || 0);
                const qty = parseInt(document.getElementById('stockOutQuantity').value);
                const reason = document.getElementById('stockOutReason').value;

                if (!productId) {
                    alert('Please select a product');
                    return;
                }
                if (!qty || qty <= 0) {
                    alert('Please enter a valid quantity greater than 0');
                    return;
                }
                if (!reason || reason === '') {
                    alert('Please select a reason for stock out');
                    return;
                }
                if (qty > currentStock) {
                    alert(`❌ Insufficient stock!\n\nAvailable: ${currentStock} units\nRequested: ${qty} units\n\nPlease reduce the quantity or add more stock first.`);
                    return;
                }

                try {
                    const response = await fetch(`${API_URL}/stock-movements`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            product_id: parseInt(productId),
                            product_name: productName,
                            type: 'OUT',
                            quantity: qty,
                            details: `Reason: ${reason}`
                        })
                    });

                    if (response.ok) {
                        await loadMovements();
                        await loadProductsForDropdowns();
                        stockOutForm.reset();
                        window.dispatchEvent(new CustomEvent('stockMovementChanged'));
                        alert(`✅ Stock Out recorded! Removed ${qty} units of ${productName}\nRemaining stock: ${currentStock - qty}`);
                    } else {
                        const error = await response.json();
                        alert('Failed to record stock out: ' + error.error);
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('Error recording stock out');
                }
            });
        }

        document.getElementById('clearHistoryBtn').addEventListener('click', async () => {
            if (confirm('⚠️ WARNING: This will permanently delete ALL stock movement records from the database!\n\nThis action cannot be undone. Are you sure?')) {
                try {
                    const response = await fetch(`${API_URL}/stock-movements/clear-all`, {
                        method: 'DELETE',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${localStorage.getItem('token')}`
                        }
                    });

                    if (response.ok) {
                        await loadMovements();
                        alert('✅ All stock movement records have been permanently deleted.');
                    } else {
                        const error = await response.json();
                        alert('Failed to clear records: ' + error.error);
                    }
                } catch (error) {
                    console.error('Error clearing movements:', error);
                    alert('Error clearing stock movement records');
                }
            }
        });
        function formatDateTimeWithTimezone(dateStr, timezone) {
            const date = new Date(dateStr);
            const settings = JSON.parse(localStorage.getItem('appSettings') || '{}');
            const tz = settings.timezone || 'UTC';
            const format = settings.dateFormat || 'DD/MM/YYYY';

            return new Date(date).toLocaleString('en-US', { timeZone: tz });
        }
        loadProductsForDropdowns();
        loadMovements();
    </script>
</body>

</html>
