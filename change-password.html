<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Change Password | InvenTrack</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
    <script src="validation.js"></script>
</head>

<body>
    <aside class="sidebar">
        <h2><i class="fas fa-cubes"></i> InvenTrack</h2>
        <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="products.html"><i class="fas fa-box"></i> Products</a>
        <a href="categories.html"><i class="fas fa-tags"></i> Categories</a>
        <a href="stock.html"><i class="fas fa-exchange-alt"></i> Stock Ops</a>
        <a href="suppliers.html"><i class="fas fa-truck-loading"></i> Suppliers</a>
        <a href="reports.html"><i class="fas fa-chart-pie"></i> Sales</a>
        <a href="prediction.html"><i class="fas fa-chart-line"></i> Predictions</a>
        <a href="alerts.html"><i class="fas fa-bell"></i> Alerts</a>
        <a href="users.html"><i class="fas fa-users-cog"></i> Users</a>
        <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
        <a href="change-password.html"><i class="fas fa-key"></i> Change Password</a>
        <a href="index.html" style="margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1); color: #ef4444;"><i
                class="fas fa-sign-out-alt"></i> Logout</a>
    </aside>
    <main class="main-content">
        <div style="max-width: 500px; margin: 0 auto;">
            <h1 class="page-header">Change Password</h1>

            <section class="box-section">
                <h3><i class="fas fa-lock"></i> Update Your Password</h3>
                <form id="changePasswordForm">
                    <div class="form-group">
                        <label>Current Password</label>
                        <input type="password" id="currentPassword" required>
                    </div>
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="newPassword" required minlength="6">
                        <small>Password must be at least 6 characters</small>
                    </div>
                    <div class="form-group">
                        <label>Confirm New Password</label>
                        <input type="password" id="confirmPassword" required>
                    </div>
                    <button type="submit" class="btn-primary">Update Password</button>
                </form>
            </section>
        </div>
    </main>

    <script>
        const API_URL = 'https://inventrack-backend-2wso.onrender.com/api';
        const token = localStorage.getItem('token');
        const userId = localStorage.getItem('userId');

        // Redirect if not logged in
        if (!token) {
            window.location.href = 'index.html';
        }

        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                alert('New passwords do not match');
                return;
            }

            if (newPassword.length < 6) {
                alert('Password must be at least 6 characters');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/change-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        userId: parseInt(userId),
                        currentPassword: currentPassword,
                        newPassword: newPassword
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Password changed successfully! Please log in again.');
                    localStorage.clear();
                    window.location.href = 'index.html';
                } else {
                    alert(data.error || 'Failed to change password');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error changing password');
            }
        });
    </script>
    <script src="toast.js"></script>
</body>

</html>
