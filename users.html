<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Users & Roles | InvenTrack</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="validation.js"></script>
    <style>
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 1.25rem;
            border-radius: 12px;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            margin-bottom: 2rem;
            gap: 1rem;
        }

        .search-wrapper {
            position: relative;
            width: 100%;
            max-width: 300px;
        }

        .search-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .search-wrapper input {
            padding-left: 2.5rem;
            width: 100%;
        }

        .table-actions button {
            background: transparent;
            border: none;
            cursor: pointer;
            color: #64748b;
            font-size: 1.1rem;
            transition: color 0.2s;
            margin-right: 0.5rem;
            padding: 0;
        }

        .table-actions button:hover {
            color: #3b82f6;
        }

        .table-actions button.del:hover {
            color: #ef4444;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .close-modal {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            cursor: pointer;
            color: #94a3b8;
            font-size: 1.25rem;
            transition: 0.2s;
        }

        .close-modal:hover {
            color: #ef4444;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .checkbox-group input {
            width: auto;
            margin-right: 0.5rem;
        }

        .checkbox-group label {
            margin-bottom: 0;
            font-weight: normal;
            font-size: 0.9rem;
        }
    </style>
    <script src="auth.js"></script>
</head>

<body>
    <aside class="sidebar">
        <h2><i class="fas fa-cubes"></i> InvenTrack</h2>
        <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="products.html"><i class="fas fa-box"></i> Products</a>
        <a href="categories.html"><i class="fas fa-tags"></i> Categories</a>
        <a href="stock.html"><i class="fas fa-exchange-alt"></i> Stock</a>
        <a href="suppliers.html"><i class="fas fa-truck-loading"></i> Suppliers</a>
        <a href="reports.html"><i class="fas fa-file-invoice"></i> Reports</a>
        <a href="prediction.html"><i class="fas fa-chart-scatter"></i> Predictions</a>
        <a href="users.html" class="active"><i class="fas fa-users-cog"></i> Users & Roles</a>
        <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
        <a href="change-password.html"><i class="fas fa-key"></i> Change Password</a>
        <a href="index.html" style="margin-top: auto; border-top: 1px solid #1e293b; color: #ef4444;"><i
                class="fas fa-sign-out-alt"></i> Logout</a>
    </aside>

    <main class="main-content">
        <h1 class="page-header">Users & Permissions</h1>

        <div class="toolbar">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search users...">
            </div>
            <button id="addUserBtn" class="btn-primary" style="width: auto;"><i class="fas fa-user-plus"></i> Add
                User</button>
        </div>

        <section class="box-section">
            <div style="overflow-x: auto;">
                <table style="min-width: 600px;">
                    <thead>
                        <tr>
                            <th>User Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th style="text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Modal -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeModalBtn"><i class="fas fa-times"></i></span>
            <h2 id="modalTitle" style="margin-top: 0; margin-bottom: 1.5rem; color: #0f172a;">Add New User</h2>
            <form id="userForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="userName" required placeholder="e.g. Ali Ahmad">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="userEmail" required placeholder="ali@example.com">
                </div>
                <div class="form-group" style="display: flex; gap: 1rem;">
                    <div style="flex: 1;">
                        <label>Role</label>
                        <select id="userRole" required>
                            <option value="Staff">Staff</option>
                            <option value="Manager">Manager</option>
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label>Status</label>
                        <select id="userStatus">
                            <option value="Active">Active</option>
                            <option value="Inactive">Inactive</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="userPassword" placeholder="Leave empty for default (password123)">
                    <small style="color: #64748b;">Leave blank to use default password (password123)</small>
                </div>
                <button type="submit" class="btn-primary"
                    style="margin-top: 1.5rem; padding: 0.8rem; font-size: 1.1rem;">Save User</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://inventrack-backend-2wso.onrender.com/api';
        const modal = document.getElementById('userModal');
        const addBtn = document.getElementById('addUserBtn');
        const closeBtn = document.getElementById('closeModalBtn');
        const form = document.getElementById('userForm');
        const tableBody = document.getElementById('userTableBody');
        const modalTitle = document.getElementById('modalTitle');

        let editingId = null;
        const currentUserRole = localStorage.getItem('userRole');
        const currentUserId = parseInt(localStorage.getItem('userId'));

        // Apply role-based restrictions on page load
        function applyRoleRestrictions() {
            if (currentUserRole === 'Manager') {
                // Managers can only add Staff users
                const roleSelect = document.getElementById('userRole');
                if (roleSelect) {
                    roleSelect.innerHTML = '<option value="Staff">Staff</option>';
                }

                // Hide the "Add User" button? No, let them add Staff users
                // But maybe show a message
                const toolbar = document.querySelector('.toolbar');
                if (toolbar && !document.querySelector('.manager-info')) {
                    const infoDiv = document.createElement('div');
                    infoDiv.className = 'manager-info';
                    infoDiv.style.cssText = 'background: #fef3c7; padding: 0.5rem 1rem; border-radius: 8px; margin-bottom: 1rem; color: #d97706; font-size: 0.9rem;';
                    infoDiv.innerHTML = '<i class="fas fa-info-circle"></i> As Manager, you can only add and manage Staff users.';
                    toolbar.parentNode.insertBefore(infoDiv, toolbar.nextSibling);
                }
            }
        }

        // Load users from backend with role-based filtering
        async function loadUsers() {
            try {
                const response = await fetch(`${API_URL}/users`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                let users = await response.json();

                // Filter users based on role
                if (currentUserRole === 'Manager') {
                    // Managers only see Staff users
                    users = users.filter(user => user.role === 'Staff');
                }

                tableBody.innerHTML = '';
                if (users.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No users found</td></tr>';
                    return;
                }

                users.forEach(user => {
                    const tr = document.createElement('tr');
                    let roleBadge = '';
                    if (user.role === 'Administrator') roleBadge = '<span class="badge" style="background:#e0e7ff; color:#4f46e5;">Administrator</span>';
                    else if (user.role === 'Manager') roleBadge = '<span class="badge" style="background:#fef3c7; color:#d97706;">Manager</span>';
                    else roleBadge = '<span class="badge" style="background:#f1f5f9; color:#475569;">Staff</span>';

                    const statusBadge = user.status === 'Active'
                        ? '<span class="badge badge-success">Active</span>'
                        : '<span class="badge badge-error">Inactive</span>';

                    // Hide edit/delete buttons for:
                    // 1. Admin users when logged in as Manager
                    // 2. Own account (can't delete self)
                    const isOwnAccount = currentUserId === user.id;
                    const isAdmin = user.role === 'Administrator';
                    const isManager = user.role === 'Manager';
                    const showActions = !isOwnAccount && !(currentUserRole === 'Manager' && (isAdmin || isManager));

                    let actionsHtml = '';
                    if (showActions) {
                        actionsHtml = `
                        <button title="Edit" onclick='editUser(${JSON.stringify(user)})'><i class="fas fa-edit"></i></button>
                        <button title="Delete" class="del" onclick="deleteUser(${user.id})"><i class="fas fa-trash-alt"></i></button>
                    `;
                    } else if (isOwnAccount) {
                        actionsHtml = '<span style="color: #94a3b8;">(You)</span>';
                    } else {
                        actionsHtml = '<span style="color: #94a3b8;">Restricted</span>';
                    }

                    tr.innerHTML = `
                    <td style="font-weight: 600; color: #0f172a;">${escapeHtml(user.name)}</td>
                    <td>${escapeHtml(user.email)}</td>
                    <td>${roleBadge}</td>
                    <td>${statusBadge}</td>
                    <td class="table-actions" style="text-align: right;">
                        ${actionsHtml}
                    </td>
                `;
                    tableBody.appendChild(tr);
                });
            } catch (error) {
                console.error('Error loading users:', error);
                tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:red;">Error loading users: ${error.message}</td></tr>`;
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Add/Update user
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const user = {
                name: document.getElementById('userName').value,
                email: document.getElementById('userEmail').value,
                role: document.getElementById('userRole').value,
                status: document.getElementById('userStatus').value,
                password: document.getElementById('userPassword')?.value || null
            };

            try {
                let response;
                if (editingId) {
                    response = await fetch(`${API_URL}/users/${editingId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(user)
                    });
                } else {
                    response = await fetch(`${API_URL}/users`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(user)
                    });
                }

                if (response.ok) {
                    const data = await response.json();
                    if (data.temporaryPassword) {
                        alert(`User created! Temporary password: ${data.temporaryPassword}\nPlease ask them to change it on first login.`);
                    }
                    await loadUsers();
                    modal.classList.remove('active');
                    form.reset();
                    editingId = null;
                    // Reapply role restrictions after modal close
                    applyRoleRestrictions();
                } else {
                    const error = await response.json();
                    alert('Failed to save user: ' + error.error);
                }
            } catch (error) {
                console.error('Error saving user:', error);
                alert('Failed to save user');
            }
        });

        window.deleteUser = async (id) => {
            if (confirm('Are you sure you want to delete this user?')) {
                try {
                    const response = await fetch(`${API_URL}/users/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                    });
                    if (response.ok) {
                        alert('User deleted successfully');
                        await loadUsers();
                    } else {
                        const error = await response.json();
                        alert('Failed to delete user: ' + error.error);
                    }
                } catch (error) {
                    console.error('Error deleting user:', error);
                    alert('Failed to delete user');
                }
            }
        };

        window.editUser = (user) => {
            editingId = user.id;
            document.getElementById('userName').value = user.name;
            document.getElementById('userEmail').value = user.email;
            document.getElementById('userRole').value = user.role;
            document.getElementById('userStatus').value = user.status;
            document.getElementById('userPassword').value = '';
            modalTitle.innerText = "Edit User";
            modal.classList.add('active');
        };

        addBtn.addEventListener('click', () => {
            editingId = null;
            form.reset();
            modalTitle.innerText = "Add New User";
            modal.classList.add('active');
        });

        closeBtn.addEventListener('click', () => modal.classList.remove('active'));

        // Initialize
        applyRoleRestrictions();
        loadUsers();
    </script>
</body>

</html>
