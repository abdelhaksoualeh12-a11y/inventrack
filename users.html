<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Users | InvenTrack</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
    <style>
        .users-container {
            max-width: 900px;
        }

        .users-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .users-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #0f172a;
            margin: 0;
        }

        .user-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .user-card {
            background: white;
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(226, 232, 240, 0.8);
            display: flex;
            align-items: center;
            gap: 1.25rem;
            transition: all 0.2s ease;
        }

        .user-card:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
            border-color: #cbd5e1;
            transform: translateY(-1px);
        }

        .user-avatar {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            box-shadow: 0 4px 8px rgba(59, 130, 246, 0.15);
            flex-shrink: 0;
        }

        .user-avatar.owner {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }

        .user-avatar.admin {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }

        .user-avatar.manager {
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
        }

        .user-avatar.staff {
            background: linear-gradient(135deg, #64748b 0%, #475569 100%);
        }

        .user-info {
            flex: 1;
        }

        .user-info h3 {
            margin: 0 0 0.25rem 0;
            font-size: 1.1rem;
            font-weight: 600;
            color: #0f172a;
        }

        .user-info .user-email {
            margin: 0;
            color: #64748b;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .user-role-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 0.5rem;
        }

        .role-owner {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            color: #92400e;
        }

        .role-admin {
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
            color: #1e40af;
        }

        .role-manager {
            background: linear-gradient(135deg, #f3e8ff 0%, #e9d5ff 100%);
            color: #6b21a8;
        }

        .role-staff {
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
            color: #334155;
        }

        .user-meta {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.5rem;
        }

        .last-login {
            font-size: 0.8rem;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .user-actions {
            display: flex;
            gap: 0.5rem;
        }

        .user-actions button {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .user-actions button:hover {
            background: #eff6ff;
            color: #3b82f6;
        }

        .user-actions button.del:hover {
            background: #fee2e2;
            color: #ef4444;
        }

        .status-badge {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 0.25rem;
        }

        .status-active {
            background: #10b981;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }

        .status-inactive {
            background: #ef4444;
            box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2);
        }

        .add-user-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.25);
        }

        .add-user-btn:hover {
            background: #2563eb;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.35);
            transform: translateY(-1px);
        }

        .logged-in-as {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: #f8fafc;
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }

        .logged-in-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .logged-in-info {
            flex: 1;
        }

        .logged-in-info p {
            margin: 0;
            font-weight: 500;
            color: #0f172a;
        }

        .logged-in-info span {
            font-size: 0.8rem;
            color: #64748b;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 1.25rem;
            right: 1.25rem;
            cursor: pointer;
            color: #94a3b8;
            font-size: 1.25rem;
            transition: 0.2s;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        .close-modal:hover {
            background: #f1f5f9;
            color: #ef4444;
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <h2><i class="fas fa-cubes"></i> InvenTrack</h2>
        <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="products.html"><i class="fas fa-box"></i> Products</a>
        <a href="categories.html"><i class="fas fa-tags"></i> Categories</a>
        <a href="stock.html"><i class="fas fa-exchange-alt"></i> Stock Ops</a>
        <a href="suppliers.html"><i class="fas fa-truck-loading"></i> Suppliers</a>
        <a href="reports.html"><i class="fas fa-chart-pie"></i> Sales</a>
        <a href="prediction.html"><i class="fas fa-chart-line"></i> Predictions</a>
        <a href="alerts.html"><i class="fas fa-bell"></i> Alerts</a>
        <a href="users.html"><i class="fas fa-users-cog"></i> Users</a>
        <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
        <a href="change-password.html"><i class="fas fa-key"></i> Change Password</a>
        <a href="index.html" style="margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1); color: #ef4444;"><i
                class="fas fa-sign-out-alt"></i> Logout</a>
    </aside>

    <main class="main-content">
        <div class="users-container">
            <!-- Logged in as -->
            <div class="logged-in-as">
                <div class="logged-in-avatar">
                    <span id="loggedInInitials">AD</span>
                </div>
                <div class="logged-in-info">
                    <p id="loggedInName">Loading...</p>
                    <span id="loggedInRole">Administrator</span>
                </div>
            </div>

            <div class="users-header">
                <h1>User Management</h1>
                <button class="add-user-btn" id="addUserBtn">
                    <i class="fas fa-plus"></i> Add User
                </button>
            </div>

            <div class="user-grid" id="userGrid">
                <!-- Users will be loaded here -->
            </div>
        </div>
    </main>

    <!-- Add/Edit User Modal -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeModalBtn"><i class="fas fa-times"></i></span>
            <h2 id="modalTitle" style="margin-top: 0; margin-bottom: 1.5rem; font-weight: 600;">Add New User</h2>
            <form id="userForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="userName" required placeholder="e.g. John Worker">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="userEmail" required placeholder="john@inventrack.com">
                </div>
                <div class="form-group" style="display: flex; gap: 1rem;">
                    <div style="flex: 1;">
                        <label>Role</label>
                        <select id="userRole" required>
                            <option value="Staff">Staff</option>
                            <option value="Manager">Manager</option>
                            <option value="Administrator">Administrator</option>
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label>Status</label>
                        <select id="userStatus">
                            <option value="Active">Active</option>
                            <option value="Inactive">Inactive</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="userPassword" placeholder="Leave empty for default (password123)">
                    <small style="color: #64748b; font-size: 0.8rem;">Leave blank to use default password</small>
                </div>
                <button type="submit" class="btn-primary"
                    style="width: 100%; margin-top: 1rem; justify-content: center; padding: 0.875rem;">
                    Save User
                </button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://inventrack-backend-2wso.onrender.com/api';
        const modal = document.getElementById('userModal');
        const addBtn = document.getElementById('addUserBtn');
        const closeBtn = document.getElementById('closeModalBtn');
        const form = document.getElementById('userForm');
        const userGrid = document.getElementById('userGrid');
        const modalTitle = document.getElementById('modalTitle');

        let editingId = null;
        const currentUserRole = localStorage.getItem('userRole');
        const currentUserId = parseInt(localStorage.getItem('userId'));
        const currentUserName = localStorage.getItem('userName');

        // Display logged in user
        document.getElementById('loggedInName').textContent = currentUserName || 'User';
        document.getElementById('loggedInRole').textContent = currentUserRole || 'User';
        if (currentUserName) {
            const initials = currentUserName.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
            document.getElementById('loggedInInitials').textContent = initials;
        }

        // Apply role-based restrictions
        function applyRoleRestrictions() {
            if (currentUserRole === 'Manager') {
                const roleSelect = document.getElementById('userRole');
                if (roleSelect) {
                    roleSelect.innerHTML = '<option value="Staff">Staff</option>';
                }
            }
        }

        // Get role badge class
        function getRoleBadgeClass(role) {
            switch (role) {
                case 'Administrator': return 'role-admin';
                case 'Manager': return 'role-manager';
                case 'Staff': return 'role-staff';
                default: return 'role-staff';
            }
        }

        // Get avatar class
        function getAvatarClass(role) {
            switch (role) {
                case 'Administrator': return 'admin';
                case 'Manager': return 'manager';
                case 'Staff': return 'staff';
                default: return 'staff';
            }
        }

        // Get initials
        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        }

        // Load users
        async function loadUsers() {
            try {
                const response = await fetch(`${API_URL}/users`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                let users = await response.json();

                if (currentUserRole === 'Manager') {
                    users = users.filter(user => user.role === 'Staff');
                }

                if (users.length === 0) {
                    userGrid.innerHTML = '<div style="text-align: center; padding: 3rem; color: #94a3b8;">No users found</div>';
                    return;
                }

                userGrid.innerHTML = users.map(user => {
                    const isOwnAccount = currentUserId === user.id;
                    const isAdmin = user.role === 'Administrator';
                    const isManager = user.role === 'Manager';
                    const showActions = !isOwnAccount && !(currentUserRole === 'Manager' && (isAdmin || isManager));

                    const roleBadgeClass = getRoleBadgeClass(user.role);
                    const avatarClass = getAvatarClass(user.role);
                    const initials = getInitials(user.name);
                    const statusClass = user.status === 'Active' ? 'status-active' : 'status-inactive';

                    // Mock last login (you can add this field to your database later)
                    const lastLogin = user.last_login || '2024-03-15';

                    let actionsHtml = '';
                    if (showActions) {
                        actionsHtml = `
                            <div class="user-actions">
                                <button onclick='editUser(${JSON.stringify(user).replace(/'/g, "&apos;")})' title="Edit">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="del" onclick="deleteUser(${user.id})" title="Delete">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        `;
                    } else if (isOwnAccount) {
                        actionsHtml = '<span style="color: #94a3b8; font-size: 0.8rem;">(You)</span>';
                    }

                    return `
                        <div class="user-card">
                            <div class="user-avatar ${avatarClass}">
                                ${initials}
                            </div>
                            <div class="user-info">
                                <h3>${escapeHtml(user.name)}</h3>
                                <p class="user-email">
                                    <span class="status-badge ${statusClass}"></span>
                                    ${escapeHtml(user.email)}
                                </p>
                                <span class="user-role-badge ${roleBadgeClass}">${user.role}</span>
                            </div>
                            <div class="user-meta">
                                <span class="last-login">
                                    <i class="far fa-clock"></i> Last login: ${lastLogin}
                                </span>
                                ${actionsHtml}
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading users:', error);
                userGrid.innerHTML = '<div style="text-align: center; padding: 3rem; color: #ef4444;">Error loading users</div>';
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Form submit
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const user = {
                name: document.getElementById('userName').value,
                email: document.getElementById('userEmail').value,
                role: document.getElementById('userRole').value,
                status: document.getElementById('userStatus').value,
                password: document.getElementById('userPassword')?.value || null
            };

            try {
                let response;
                if (editingId) {
                    response = await fetch(`${API_URL}/users/${editingId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(user)
                    });
                } else {
                    response = await fetch(`${API_URL}/users`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(user)
                    });
                }

                if (response.ok) {
                    const data = await response.json();
                    if (data.temporaryPassword) {
                        alert(`User created! Temporary password: ${data.temporaryPassword}`);
                    }
                    await loadUsers();
                    modal.classList.remove('active');
                    form.reset();
                    editingId = null;
                    applyRoleRestrictions();
                } else {
                    const error = await response.json();
                    alert('Failed to save user: ' + error.error);
                }
            } catch (error) {
                console.error('Error saving user:', error);
                alert('Failed to save user');
            }
        });

        window.deleteUser = async (id) => {
            if (confirm('Are you sure you want to delete this user?')) {
                try {
                    const response = await fetch(`${API_URL}/users/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                    });
                    if (response.ok) {
                        await loadUsers();
                    } else {
                        const error = await response.json();
                        alert('Failed to delete user: ' + error.error);
                    }
                } catch (error) {
                    console.error('Error deleting user:', error);
                    alert('Failed to delete user');
                }
            }
        };

        window.editUser = (user) => {
            editingId = user.id;
            document.getElementById('userName').value = user.name;
            document.getElementById('userEmail').value = user.email;
            document.getElementById('userRole').value = user.role;
            document.getElementById('userStatus').value = user.status;
            document.getElementById('userPassword').value = '';
            modalTitle.innerText = "Edit User";
            modal.classList.add('active');
        };

        addBtn.addEventListener('click', () => {
            editingId = null;
            form.reset();
            modalTitle.innerText = "Add New User";
            modal.classList.add('active');
        });

        closeBtn.addEventListener('click', () => modal.classList.remove('active'));
        window.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.remove('active');
        });

        // Initialize
        applyRoleRestrictions();
        loadUsers();
    </script>
</body>

</html>
