<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Settings | InvenTrack</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
</head>
<body>
    <aside class="sidebar">
        <h2><i class="fas fa-cubes"></i> InvenTrack</h2>
        <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="products.html"><i class="fas fa-box"></i> Products</a>
        <a href="categories.html"><i class="fas fa-tags"></i> Categories</a>
        <a href="stock.html"><i class="fas fa-exchange-alt"></i> Stock</a>
        <a href="suppliers.html"><i class="fas fa-truck-loading"></i> Suppliers</a>
        <a href="reports.html"><i class="fas fa-file-invoice"></i> Reports</a>
        <a href="users.html"><i class="fas fa-users-cog"></i> Users & Roles</a>
        <a href="settings.html" class="active"><i class="fas fa-cog"></i> Settings</a>
        <a href="index.html" style="margin-top: auto; border-top: 1px solid #1e293b; color: #ef4444;"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </aside>

    <main class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1 class="page-header" style="margin-bottom: 0; border: none; padding: 0;">System Settings</h1>
            <button class="btn-primary" onclick="alert('Settings Saved Successfully!')" style="width: auto;"><i class="fas fa-save"></i> Save Changes</button>
        </div>

        <div class="grid-2">
            <!-- Company Profile -->
            <section class="box-section">
                <h3><i class="fas fa-building" style="color: #64748b; margin-right:8px;"></i> Company Profile</h3>
                <form>
                    <div class="form-group">
                        <label>Company/Store Name</label>
                        <input type="text" value="InvenTrack Solutions">
                    </div>
                    <div class="form-group">
                        <label>Support Email</label>
                        <input type="email" value="contact@inventrack.com">
                    </div>
                    <div class="form-group">
                        <label>Company Address</label>
                        <input type="text" value="123 Business Avenue, Tech District">
                    </div>
                    <div class="form-group">
                        <label>Tax ID / VAT Number</label>
                        <input type="text" value="TRN-5544332211">
                    </div>
                </form>
            </section>

            <!-- Preferences & Localization -->
            <div>
                <section class="box-section">
                    <h3><i class="fas fa-globe" style="color: #64748b; margin-right:8px;"></i> Localization</h3>
                    <form>
                        <div class="form-group">
                            <label>Default Currency</label>
                            <select>
                                <option value="USD">USD ($)</option>
                                <option value="EUR">EUR (€)</option>
                                <option value="SAR">SAR (ريال)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Timezone</label>
                            <select>
                                <option value="UTC">UTC (Universal Time)</option>
                                <option value="EST">EST (Eastern Standard Time)</option>
                                <option value="AST">AST (Arabia Standard Time)</option>
                            </select>
                        </div>
                    </form>
                </section>

                <section class="box-section">
                    <h3><i class="fas fa-sliders-h" style="color: #64748b; margin-right:8px;"></i> Inventory Settings</h3>
                    <form>
                        <div class="form-group">
                            <label>Global Default Low Stock Alert</label>
                            <input type="number" value="10">
                            <small style="color: #94a3b8; margin-top: 0.25rem; display: block;">This value will be standard for new products unless overridden.</small>
                        </div>
                    </form>
                </section>
            </div>
        </div>
    </main>
</body>
</html>
