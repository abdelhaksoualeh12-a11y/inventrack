<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Settings | InvenTrack</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
    <script src="validation.js"></script>
    <style>
        .currency-display {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            background: #f1f5f9;
            border-radius: 6px;
            font-weight: 600;
        }

        .timezone-preview {
            font-family: monospace;
            font-size: 0.9rem;
            color: #64748b;
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <h2><i class="fas fa-cubes"></i> InvenTrack</h2>
        <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="products.html"><i class="fas fa-box"></i> Products</a>
        <a href="categories.html"><i class="fas fa-tags"></i> Categories</a>
        <a href="stock.html"><i class="fas fa-exchange-alt"></i> Stock Ops</a>
        <a href="suppliers.html"><i class="fas fa-truck-loading"></i> Suppliers</a>
        <a href="reports.html"><i class="fas fa-chart-pie"></i> Sales</a>
        <a href="prediction.html"><i class="fas fa-chart-line"></i> Predictions</a>
        <a href="alerts.html"><i class="fas fa-bell"></i> Alerts</a>
        <a href="users.html"><i class="fas fa-users-cog"></i> Users</a>
        <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
        <a href="change-password.html"><i class="fas fa-key"></i> Change Password</a>
        <a href="index.html" style="margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1); color: #ef4444;"><i
                class="fas fa-sign-out-alt"></i> Logout</a>
    </aside>

    <main class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1 class="page-header" style="margin-bottom: 0; border: none; padding: 0;">System Settings</h1>
            <button id="saveSettingsBtn" class="btn-primary" style="width: auto;"><i class="fas fa-save"></i> Save
                Changes</button>
        </div>

        <div class="grid-2">
            <!-- Company Profile -->
            <section class="box-section">
                <h3><i class="fas fa-building" style="color: #64748b; margin-right:8px;"></i> Company Profile</h3>
                <form id="companyForm">
                    <div class="form-group">
                        <label>Company/Store Name</label>
                        <input type="text" id="companyName" value="InvenTrack Solutions">
                    </div>
                    <div class="form-group">
                        <label>Support Email</label>
                        <input type="email" id="supportEmail" value="contact@inventrack.com">
                    </div>
                    <div class="form-group">
                        <label>Company Address</label>
                        <input type="text" id="companyAddress" value="123 Business Avenue, Tech District">
                    </div>
                    <div class="form-group">
                        <label>Tax ID / VAT Number</label>
                        <input type="text" id="taxId" value="TRN-5544332211">
                    </div>
                </form>
            </section>

            <!-- Currency & Timezone Settings -->
            <div>
                <section class="box-section">
                    <h3><i class="fas fa-globe" style="color: #64748b; margin-right:8px;"></i> Currency Settings</h3>
                    <div class="form-group">
                        <label>Default Currency</label>
                        <select id="currencySelect">
                            <option value="USD">USD ($) - US Dollar</option>
                            <option value="EUR">EUR (€) - Euro</option>
                            <option value="GBP">GBP (£) - British Pound</option>
                            <option value="DZD">DZD (دج) - Algerian Dinar</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Currency Position</label>
                        <select id="currencyPosition">
                            <option value="before">Before amount (e.g., $100)</option>
                            <option value="after">After amount (e.g., 100 $)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Decimal Places</label>
                        <select id="decimalPlaces">
                            <option value="0">0 (e.g., 100)</option>
                            <option value="2" selected>2 (e.g., 100.00)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Currency Symbol Preview</label>
                        <div><span id="currencyPreview" class="currency-display">$100.00</span></div>
                    </div>
                </section>

                <section class="box-section">
                    <h3><i class="fas fa-clock" style="color: #64748b; margin-right:8px;"></i> Timezone & Date Settings
                    </h3>
                    <div class="form-group">
                        <label>Timezone</label>
                        <select id="timezoneSelect">
                            <option value="UTC">UTC (Coordinated Universal Time)</option>
                            <option value="America/New_York">EST (Eastern Standard Time)</option>
                            <option value="America/Chicago">CST (Central Standard Time)</option>
                            <option value="America/Denver">MST (Mountain Standard Time)</option>
                            <option value="America/Los_Angeles">PST (Pacific Standard Time)</option>
                            <option value="Europe/London">GMT (Greenwich Mean Time)</option>
                            <option value="Europe/Paris">CET (Central European Time)</option>
                            <option value="Asia/Dubai">GST (Gulf Standard Time)</option>
                            <option value="Asia/Kolkata">IST (Indian Standard Time)</option>
                            <option value="Asia/Tokyo">JST (Japan Standard Time)</option>
                            <option value="Australia/Sydney">AEST (Australian Eastern Time)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Date Format</label>
                        <select id="dateFormat">
                            <option value="DD/MM/YYYY">DD/MM/YYYY (31/12/2024)</option>
                            <option value="MM/DD/YYYY">MM/DD/YYYY (12/31/2024)</option>
                            <option value="YYYY-MM-DD">YYYY-MM-DD (2024-12-31)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Time Format</label>
                        <select id="timeFormat">
                            <option value="24h">24-hour (14:30)</option>
                            <option value="12h">12-hour (2:30 PM)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Current Time Preview</label>
                        <div id="timePreview" class="timezone-preview">Loading...</div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script src="settings-manager.js"></script>
    <script>
        // Load settings into form
        function loadSettingsToForm() {
            const settings = getSettings();

            document.getElementById('currencySelect').value = settings.currency;
            document.getElementById('currencyPosition').value = settings.currencyPosition;
            document.getElementById('decimalPlaces').value = settings.decimalPlaces;
            document.getElementById('timezoneSelect').value = settings.timezone;
            document.getElementById('dateFormat').value = settings.dateFormat;
            document.getElementById('timeFormat').value = settings.timeFormat;

            // Load company info
            document.getElementById('companyName').value = localStorage.getItem('companyName') || 'InvenTrack Solutions';
            document.getElementById('supportEmail').value = localStorage.getItem('supportEmail') || 'contact@inventrack.com';
            document.getElementById('companyAddress').value = localStorage.getItem('companyAddress') || '123 Business Avenue, Tech District';
            document.getElementById('taxId').value = localStorage.getItem('taxId') || 'TRN-5544332211';

            updateCurrencyPreview();
            updateTimePreview();
        }

        function updateCurrencyPreview() {
            const settings = {
                currency: document.getElementById('currencySelect').value,
                currencyPosition: document.getElementById('currencyPosition').value,
                decimalPlaces: parseInt(document.getElementById('decimalPlaces').value)
            };
            const tempFormatPrice = (amount) => {
                const decimals = settings.decimalPlaces;
                const formattedAmount = amount.toFixed(decimals);
                const currencyInfo = { USD: '$', EUR: '€', GBP: '£', DZD: 'دج' };
                const symbol = currencyInfo[settings.currency] || '$';
                return settings.currencyPosition === 'before' ? `${symbol}${formattedAmount}` : `${formattedAmount} ${symbol}`;
            };
            document.getElementById('currencyPreview').innerHTML = tempFormatPrice(100);
        }

        function updateTimePreview() {
            const timezone = document.getElementById('timezoneSelect').value;
            const dateFormat = document.getElementById('dateFormat').value;
            const timeFormat = document.getElementById('timeFormat').value;

            const now = new Date();
            const options = {
                timeZone: timezone,
                hour12: timeFormat === '12h',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            };
            const timeStr = now.toLocaleTimeString('en-US', options);

            // Format date
            const day = now.getDate().toString().padStart(2, '0');
            const month = (now.getMonth() + 1).toString().padStart(2, '0');
            const year = now.getFullYear();
            let dateStr = '';
            switch (dateFormat) {
                case 'DD/MM/YYYY': dateStr = `${day}/${month}/${year}`; break;
                case 'MM/DD/YYYY': dateStr = `${month}/${day}/${year}`; break;
                default: dateStr = `${year}-${month}-${day}`;
            }

            document.getElementById('timePreview').innerHTML = `${dateStr} ${timeStr} (${timezone.split('/').pop()})`;
        }

        function saveAllSettings() {
            const settings = {
                currency: document.getElementById('currencySelect').value,
                currencyPosition: document.getElementById('currencyPosition').value,
                decimalPlaces: parseInt(document.getElementById('decimalPlaces').value),
                timezone: document.getElementById('timezoneSelect').value,
                dateFormat: document.getElementById('dateFormat').value,
                timeFormat: document.getElementById('timeFormat').value
            };

            saveSettings(settings);

            // Save company info
            localStorage.setItem('companyName', document.getElementById('companyName').value);
            localStorage.setItem('supportEmail', document.getElementById('supportEmail').value);
            localStorage.setItem('companyAddress', document.getElementById('companyAddress').value);
            localStorage.setItem('taxId', document.getElementById('taxId').value);

            alert('Settings saved successfully!');

            // Force refresh of all pages
            if (window.opener) {
                window.opener.postMessage('settingsUpdated', '*');
            }
        }

        // Event listeners
        document.getElementById('currencySelect').addEventListener('change', updateCurrencyPreview);
        document.getElementById('currencyPosition').addEventListener('change', updateCurrencyPreview);
        document.getElementById('decimalPlaces').addEventListener('change', updateCurrencyPreview);
        document.getElementById('timezoneSelect').addEventListener('change', updateTimePreview);
        document.getElementById('dateFormat').addEventListener('change', updateTimePreview);
        document.getElementById('timeFormat').addEventListener('change', updateTimePreview);
        document.getElementById('saveSettingsBtn').addEventListener('click', saveAllSettings);

        setInterval(updateTimePreview, 1000);

        loadSettingsToForm();
    </script>
</body>

</html>
