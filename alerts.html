<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Alerts | InvenTrack</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
    <style>
        .alerts-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .alerts-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #0f172a;
            margin: 0;
        }
        
        .alert-stats {
            display: flex;
            gap: 1rem;
        }
        
        .alert-stat {
            background: white;
            padding: 0.5rem 1.25rem;
            border-radius: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .alert-stat.outofstock {
            border-left: 4px solid #ef4444;
        }
        
        .alert-stat.lowstock {
            border-left: 4px solid #f59e0b;
        }
        
        .alert-stat .count {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .alert-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .alert-card {
            background: white;
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            transition: all 0.2s ease;
        }
        
        .alert-card:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
        }
        
        .alert-card.outofstock {
            border-left: 4px solid #ef4444;
        }
        
        .alert-card.lowstock {
            border-left: 4px solid #f59e0b;
        }
        
        .alert-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
        }
        
        .alert-icon.outofstock {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            color: #ef4444;
        }
        
        .alert-icon.lowstock {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            color: #f59e0b;
        }
        
        .alert-content {
            flex: 1;
        }
        
        .alert-content h3 {
            margin: 0 0 0.25rem 0;
            font-size: 1.1rem;
            font-weight: 600;
            color: #0f172a;
        }
        
        .alert-content p {
            margin: 0;
            color: #64748b;
            font-size: 0.9rem;
        }
        
        .alert-content .stock-info {
            margin-top: 0.5rem;
            font-size: 0.85rem;
        }
        
        .alert-content .stock-info .threshold {
            color: #94a3b8;
        }
        
        .alert-action .btn-primary {
            padding: 0.625rem 1.25rem;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        
        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #0f172a;
            margin: 1.5rem 0 1rem 0;
        }
        
        .section-title:first-of-type {
            margin-top: 0;
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <h2><i class="fas fa-cubes"></i> InvenTrack</h2>
        <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="products.html"><i class="fas fa-box"></i> Products</a>
        <a href="categories.html"><i class="fas fa-tags"></i> Categories</a>
        <a href="stock.html"><i class="fas fa-exchange-alt"></i> Stock Ops</a>
        <a href="suppliers.html"><i class="fas fa-truck-loading"></i> Suppliers</a>
        <a href="reports.html"><i class="fas fa-chart-pie"></i> Sales</a>
        <a href="prediction.html"><i class="fas fa-chart-line"></i> Predictions</a>
        <a href="alerts.html" class="active"><i class="fas fa-bell"></i> Alerts</a>
        <a href="users.html"><i class="fas fa-users-cog"></i> Users</a>
        <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
        <a href="change-password.html"><i class="fas fa-key"></i> Change Password</a>
        <a href="index.html" style="margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1); color: #ef4444;"><i
                class="fas fa-sign-out-alt"></i> Logout</a>
    </aside>

    <main class="main-content">
        <div class="alerts-header">
            <h1><i class="fas fa-bell" style="color: #3b82f6; margin-right: 0.75rem;"></i> Stock Alerts</h1>
            <div class="alert-stats">
                <div class="alert-stat outofstock">
                    <span style="color: #ef4444;">Out of Stock</span>
                    <span class="count" id="outOfStockCount" style="color: #ef4444;">0</span>
                </div>
                <div class="alert-stat lowstock">
                    <span style="color: #f59e0b;">Low Stock</span>
                    <span class="count" id="lowStockCount" style="color: #f59e0b;">0</span>
                </div>
            </div>
        </div>
        
        <!-- Out of Stock Section -->
        <h2 class="section-title" style="color: #ef4444;">
            <i class="fas fa-times-circle"></i> Out of Stock Products
        </h2>
        <div class="alert-grid" id="outOfStockGrid">
            <div class="alert-card outofstock">
                <div class="alert-content">
                    <p style="color: #94a3b8;">Loading...</p>
                </div>
            </div>
        </div>
        
        <!-- Low Stock Section -->
        <h2 class="section-title" style="color: #f59e0b; margin-top: 2rem;">
            <i class="fas fa-exclamation-triangle"></i> Low Stock Products
        </h2>
        <div class="alert-grid" id="lowStockGrid">
            <div class="alert-card lowstock">
                <div class="alert-content">
                    <p style="color: #94a3b8;">Loading...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'https://inventrack-backend-2wso.onrender.com/api';
        
        async function loadAlerts() {
            try {
                const response = await fetch(`${API_URL}/products`);
                const products = await response.json();
                
                const outOfStock = products.filter(p => p.status === 'Out of Stock');
                const lowStock = products.filter(p => p.status === 'Low Stock');
                
                // Update counts
                document.getElementById('outOfStockCount').textContent = outOfStock.length;
                document.getElementById('lowStockCount').textContent = lowStock.length;
                
                // Render Out of Stock
                const outGrid = document.getElementById('outOfStockGrid');
                if (outOfStock.length === 0) {
                    outGrid.innerHTML = '<div class="alert-card outofstock"><div class="alert-content"><p>No out of stock products</p></div></div>';
                } else {
                    outGrid.innerHTML = outOfStock.map(p => `
                        <div class="alert-card outofstock">
                            <div class="alert-icon outofstock">
                                <i class="fas fa-box-open"></i>
                            </div>
                            <div class="alert-content">
                                <h3>${escapeHtml(p.name)}</h3>
                                <p>${escapeHtml(p.sku)} · ${escapeHtml(p.category)}</p>
                                <div class="stock-info">
                                    <span style="color: #ef4444; font-weight: 600;">Stock: 0</span>
                                </div>
                            </div>
                            <div class="alert-action">
                                <a href="stock.html" class="btn-primary">
                                    <i class="fas fa-arrow-down"></i> Reorder Now
                                </a>
                            </div>
                        </div>
                    `).join('');
                }
                
                // Render Low Stock
                const lowGrid = document.getElementById('lowStockGrid');
                if (lowStock.length === 0) {
                    lowGrid.innerHTML = '<div class="alert-card lowstock"><div class="alert-content"><p>No low stock products</p></div></div>';
                } else {
                    lowGrid.innerHTML = lowStock.map(p => `
                        <div class="alert-card lowstock">
                            <div class="alert-icon lowstock">
                                <i class="fas fa-exclamation"></i>
                            </div>
                            <div class="alert-content">
                                <h3>${escapeHtml(p.name)}</h3>
                                <p>${escapeHtml(p.sku)} · Stock: ${p.quantity} / Threshold: ${p.alert_qty}</p>
                                <div class="stock-info">
                                    <span class="threshold">Suggested reorder: ${Math.max(p.alert_qty * 2 - p.quantity, 10)} units</span>
                                </div>
                            </div>
                            <div class="alert-action">
                                <a href="stock.html" class="btn-primary">
                                    <i class="fas fa-cart-plus"></i> Reorder
                                </a>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading alerts:', error);
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        loadAlerts();
    </script>
    <script src="toast.js"></script>
</body>

</html>
