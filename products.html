<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Products | InvenTrack</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="validation.js"></script>
    <script src="settings-manager.js"></script>
    <style>
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 1.25rem;
            border-radius: 12px;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            margin-bottom: 2rem;
            gap: 1rem;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .toolbar-group input,
        .toolbar-group select {
            width: auto;
            min-width: 150px;
        }

        .search-wrapper {
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .search-wrapper input {
            padding-left: 2.5rem;
        }

        .table-actions button {
            background: transparent;
            border: none;
            cursor: pointer;
            color: #64748b;
            font-size: 1.1rem;
            transition: color 0.2s;
            margin-right: 0.5rem;
            padding: 0;
        }

        .table-actions button:hover {
            color: #3b82f6;
        }

        .table-actions button.del:hover {
            color: #ef4444;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            cursor: pointer;
            color: #94a3b8;
            font-size: 1.25rem;
            transition: 0.2s;
        }

        .close-modal:hover {
            color: #ef4444;
        }
    </style>
    <script src="auth.js"></script>
</head>

<body>
    <aside class="sidebar">
        <h2><i class="fas fa-cubes"></i> InvenTrack</h2>
        <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="products.html"><i class="fas fa-box"></i> Products</a>
        <a href="categories.html"><i class="fas fa-tags"></i> Categories</a>
        <a href="stock.html"><i class="fas fa-exchange-alt"></i> Stock Ops</a>
        <a href="suppliers.html"><i class="fas fa-truck-loading"></i> Suppliers</a>
        <a href="reports.html"><i class="fas fa-chart-pie"></i> Sales</a>
        <a href="prediction.html"><i class="fas fa-chart-line"></i> Predictions</a>
        <a href="alerts.html"><i class="fas fa-bell"></i> Alerts</a>
        <a href="users.html"><i class="fas fa-users-cog"></i> Users</a>
        <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
        <a href="change-password.html"><i class="fas fa-key"></i> Change Password</a>
        <a href="index.html" style="margin-top: auto; border-top: 1px solid rgba(255,255,255,0.1); color: #ef4444;"><i
                class="fas fa-sign-out-alt"></i> Logout</a>
    </aside>

    <main class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1 class="page-header" style="margin-bottom: 0; border: none; padding: 0;">Products Directory</h1>
            <button id="addProdBtn" class="btn-primary" style="width: auto;"><i class="fas fa-plus"></i> Add
                Product</button>
        </div>

        <!-- Top Action Bar (Toolbar) -->
        <div class="toolbar">
            <div class="toolbar-group">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search by Name or SKU...">
                </div>
                <select>
                    <option value="">All Categories</option>
                    <option value="electronics">Electronics</option>
                    <option value="accessories">Accessories</option>
                    <option value="peripherals">Peripherals</option>
                </select>
                <select>
                    <option value="">All Statuses</option>
                    <option value="in_stock">In Stock</option>
                    <option value="low_stock">Low Stock</option>
                    <option value="out_of_stock">Out of Stock</option>
                </select>
            </div>

            <div class="toolbar-group">
                <span style="color: #64748b; font-size: 0.9rem; white-space: nowrap;">Sort by:</span>
                <select>
                    <option value="name_asc">Name (A-Z)</option>
                    <option value="qty_desc">Quantity (High-Low)</option>
                    <option value="price_desc">Price (Highest)</option>
                </select>
            </div>
        </div>

        <!-- Products Table -->
        <section class="box-section">
            <div style="overflow-x: auto;">
                <table style="min-width: 1000px;">
                    <thead>
                        <tr>
                            <th>Product Name</th>
                            <th>SKU</th>
                            <th>Category</th>
                            <th>Quantity</th>
                            <th>Buying</th>
                            <th>Selling</th>
                            <th>Status</th>
                            <th>Created Date</th>
                            <th style="text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody">
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Add Product Modal -->
    <div id="addProductModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeModalBtn"><i class="fas fa-times"></i></span>
            <h2 style="margin-top: 0; margin-bottom: 1.5rem; color: #0f172a;">Add New Product</h2>
            <form id="addProductForm">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="prodName" required placeholder="e.g. Logitech MX Master 3">
                </div>
                <div class="form-group">
                    <label>SKU</label>
                    <input type="text" id="prodSKU" required placeholder="e.g. MOU-LOG-MX3">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="prodCategory" required>
                        <option value="Electronics">Electronics</option>
                        <option value="Peripherals">Peripherals</option>
                        <option value="Accessories">Accessories</option>
                        <option value="Components">Components</option>
                    </select>
                </div>
                <div class="form-group" style="display: flex; gap: 1rem;">
                    <div style="flex: 1;">
                        <label>Quantity</label>
                        <input type="number" id="prodQuantity" required min="0" placeholder="0">
                    </div>
                    <div style="flex: 1;">
                        <label>Low Stock Alert</label>
                        <input type="number" id="prodAlertQty" required min="1" placeholder="e.g. 10">
                    </div>
                </div>
                <div class="form-group" style="display: flex; gap: 1rem;">
                    <div style="flex: 1;">
                        <label>Buying Price ($)</label>
                        <input type="number" id="prodBuyingPrice" required min="0" step="0.01" placeholder="0.00">
                    </div>
                    <div style="flex: 1;">
                        <label>Selling Price ($)</label>
                        <input type="number" id="prodSellingPrice" required min="0" step="0.01" placeholder="0.00">
                    </div>
                </div>
                <button type="submit" class="btn-primary"
                    style="margin-top: 1rem; padding: 0.8rem; font-size: 1.1rem;">Save Product</button>
            </form>
        </div>
    </div>

    <!-- Script to handle Modal, Add, Edit, and Delete Product logic -->
    <script>
        const API_URL = 'https://inventrack-backend-2wso.onrender.com/api';

        const modal = document.getElementById('addProductModal');
        const addBtn = document.getElementById('addProdBtn');
        const closeBtn = document.getElementById('closeModalBtn');
        const form = document.getElementById('addProductForm');
        const tableBody = document.getElementById('productTableBody');

        let editingId = null;
        let allProducts = [];

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function getStatusColor(status) {
            switch (status) {
                case 'In Stock': return '#10b981';
                case 'Low Stock': return '#f59e0b';
                case 'Out of Stock': return '#ef4444';
                default: return '#475569';
            }
        }

        function validateProduct(product) {
            if (!product.name || product.name.length < 2) {
                showWarning('Product name must be at least 2 characters');
                return false;
            }
            if (!product.sku || product.sku.length < 3) {
                showWarning('SKU must be at least 3 characters');
                return false;
            }
            if (product.quantity < 0) {
                showWarning('Quantity cannot be negative');
                return false;
            }
            if (product.selling_price <= 0) {
                showWarning('Selling price must be greater than 0');
                return false;
            }
            if (product.alert_qty < 1) {
                showWarning('Low stock alert must be at least 1');
                return false;
            }
            return true;
        }

        function renderProducts(productsToRender) {
            tableBody.innerHTML = '';
            const userRole = localStorage.getItem('userRole');
            const isStaff = userRole === 'Staff';

            if (productsToRender.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 2rem;">No products found</td></tr>';
                return;
            }

            productsToRender.forEach(product => {
                const tr = document.createElement('tr');
                tr.dataset.id = product.id;

                let actionsHtml = '';
                if (!isStaff) {
                    actionsHtml = `
                    <button title="Edit Product" onclick='editProduct(${JSON.stringify(product).replace(/'/g, "&apos;")})'><i class="fas fa-edit"></i></button>
                    <button title="Delete Product" class="del" onclick="deleteProduct(${product.id})"><i class="fas fa-trash-alt"></i></button>
                `;
                } else {
                    actionsHtml = '<span style="color: #94a3b8;">View only</span>';
                }

                const formattedBuying = formatPrice(product.buying_price || 0);
                const formattedSelling = formatPrice(product.selling_price || 0);

                tr.innerHTML = `
                <td style="font-weight: 600;">${escapeHtml(product.name)}</td>
                <td style="color: #64748b;">${escapeHtml(product.sku)}</td>
                <td>${escapeHtml(product.category)}</td>
                <td>${product.quantity}</td>
                <td data-price="${product.buying_price || 0}" data-original-price="${product.buying_price || 0}">${formattedBuying}</td>
                <td data-price="${product.selling_price || 0}" data-original-price="${product.selling_price || 0}">${formattedSelling}</td>
                <td style="font-weight: 600; color: ${getStatusColor(product.status)};">${product.status}</td>
                <td data-date="${product.created_date}">${formatDate(product.created_date)}</td>
                <td class="table-actions" style="text-align: right;">
                    ${actionsHtml}
                </td>
            `;
                tableBody.appendChild(tr);
            });
        }

        function filterProducts() {
            const searchInput = document.querySelector('.search-wrapper input');
            const categorySelect = document.querySelector('.toolbar-group select:first-of-type');
            const statusSelect = document.querySelector('.toolbar-group select:last-of-type');
            const sortSelect = document.querySelector('.toolbar-group:last-child select');

            const searchTerm = searchInput?.value.toLowerCase() || '';
            const categoryFilter = categorySelect?.value || '';
            const statusFilter = statusSelect?.value || '';
            const sortBy = sortSelect?.value || 'name_asc';

            let filtered = allProducts.filter(product => {
                const matchesSearch = searchTerm === '' ||
                    product.name.toLowerCase().includes(searchTerm) ||
                    product.sku.toLowerCase().includes(searchTerm);

                const matchesCategory = categoryFilter === '' || product.category === categoryFilter;

                let matchesStatus = true;
                if (statusFilter === 'in_stock') matchesStatus = product.status === 'In Stock';
                else if (statusFilter === 'low_stock') matchesStatus = product.status === 'Low Stock';
                else if (statusFilter === 'out_of_stock') matchesStatus = product.status === 'Out of Stock';

                return matchesSearch && matchesCategory && matchesStatus;
            });

            filtered.sort((a, b) => {
                switch (sortBy) {
                    case 'name_asc': return a.name.localeCompare(b.name);
                    case 'qty_desc': return b.quantity - a.quantity;
                    case 'price_desc': return (b.selling_price || 0) - (a.selling_price || 0);
                    default: return 0;
                }
            });

            renderProducts(filtered);
        }

        async function loadCategoriesForDropdowns() {
            try {
                const response = await fetch(`${API_URL}/categories`);
                const categories = await response.json();

                const categorySelect = document.getElementById('prodCategory');
                if (categorySelect) {
                    categorySelect.innerHTML = '';
                    if (categories.length === 0) {
                        const option = document.createElement('option');
                        option.value = '';
                        option.textContent = 'No categories found - please add one first';
                        option.disabled = true;
                        categorySelect.appendChild(option);
                    } else {
                        categories.forEach(cat => {
                            const option = document.createElement('option');
                            option.value = cat.name;
                            option.textContent = cat.name;
                            categorySelect.appendChild(option);
                        });
                    }
                }

                const filterSelect = document.querySelector('.toolbar-group select:first-of-type');
                if (filterSelect) {
                    while (filterSelect.options.length > 1) {
                        filterSelect.remove(1);
                    }
                    categories.forEach(cat => {
                        const option = document.createElement('option');
                        option.value = cat.name;
                        option.textContent = cat.name;
                        filterSelect.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        async function loadProducts() {
            try {
                const response = await fetch(`${API_URL}/products`);
                allProducts = await response.json();
                renderProducts(allProducts);
                if (typeof applyGlobalSettings === 'function') {
                    setTimeout(() => applyGlobalSettings(), 50);
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Failed to load products');
            }
        }

        function addFilterEventListeners() {
            const searchInput = document.querySelector('.search-wrapper input');
            const categorySelect = document.querySelector('.toolbar-group select:first-of-type');
            const statusSelect = document.querySelector('.toolbar-group select:last-of-type');
            const sortSelect = document.querySelector('.toolbar-group:last-child select');

            if (searchInput) searchInput.addEventListener('input', filterProducts);
            if (categorySelect) categorySelect.addEventListener('change', filterProducts);
            if (statusSelect) statusSelect.addEventListener('change', filterProducts);
            if (sortSelect) sortSelect.addEventListener('change', filterProducts);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const product = {
                name: document.getElementById('prodName').value.trim(),
                sku: document.getElementById('prodSKU').value.trim(),
                category: document.getElementById('prodCategory').value,
                quantity: parseInt(document.getElementById('prodQuantity').value) || 0,
                buying_price: parseFloat(document.getElementById('prodBuyingPrice').value) || 0,
                selling_price: parseFloat(document.getElementById('prodSellingPrice').value) || 0,
                alert_qty: parseInt(document.getElementById('prodAlertQty').value) || 10
            };

            if (!validateProduct(product)) return;

            try {
                let response;
                const isEditing = !!editingId;

                if (isEditing) {
                    response = await fetch(`${API_URL}/products/${editingId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(product)
                    });
                } else {
                    response = await fetch(`${API_URL}/products`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(product)
                    });
                }

                if (response.ok) {
                    await loadProducts();
                    await loadCategoriesForDropdowns();
                    modal.classList.remove('active');
                    form.reset();
                    editingId = null;
                    document.querySelector('#addProductModal h2').innerText = "Add New Product";

                    if (isEditing) {
                        showSuccess('Product updated successfully!');
                    } else {
                        showSuccess('Product added successfully!');
                    }
                } else {
                    const error = await response.json();
                    showError('Failed to save product: ' + (error.error || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error saving product:', error);
                showError('Failed to save product');
            }
        });

        window.deleteProduct = async (id) => {
            if (confirm('Are you sure you want to delete this product?')) {
                try {
                    const response = await fetch(`${API_URL}/products/${id}`, { method: 'DELETE' });
                    if (response.ok) {
                        await loadProducts();
                        showSuccess('Product deleted successfully!');
                    } else {
                        showError('Failed to delete product');
                    }
                } catch (error) {
                    console.error('Error deleting product:', error);
                    showError('Failed to delete product');
                }
            }
        };

        window.editProduct = (product) => {
            editingId = product.id;
            document.getElementById('prodName').value = product.name || '';
            document.getElementById('prodSKU').value = product.sku || '';
            document.getElementById('prodCategory').value = product.category || '';
            document.getElementById('prodQuantity').value = product.quantity || 0;
            document.getElementById('prodBuyingPrice').value = product.buying_price || 0;
            document.getElementById('prodSellingPrice').value = product.selling_price || 0;
            document.getElementById('prodAlertQty').value = product.alert_qty || 10;
            document.querySelector('#addProductModal h2').innerText = "Edit Product";
            modal.classList.add('active');
        };

        addBtn.addEventListener('click', () => {
            editingId = null;
            form.reset();
            document.querySelector('#addProductModal h2').innerText = "Add New Product";
            modal.classList.add('active');
        });

        closeBtn.addEventListener('click', () => modal.classList.remove('active'));
        window.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.remove('active');
        });

        function applyStaffRestrictions() {
            const userRole = localStorage.getItem('userRole');
            if (userRole === 'Staff') {
                const addBtn = document.getElementById('addProdBtn');
                if (addBtn) addBtn.style.display = 'none';
            }
        }

        window.addEventListener('settingsChanged', () => {
            if (allProducts.length > 0) {
                renderProducts(allProducts);
            }
            if (typeof applyGlobalSettings === 'function') {
                applyGlobalSettings();
            }
        });

        loadProducts();
        applyStaffRestrictions();
        loadCategoriesForDropdowns();
        addFilterEventListeners();
    </script>
    <script src="toast.js"></script>
</body>

</html>
